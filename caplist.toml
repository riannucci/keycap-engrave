[batch]
size = 6

[colors]
cap = "#1A1A1A"
prim = "white"
aux = "#F99963"
sys = "#C2E189"
mod = "#56B7E6"

[default]
family = "klp_lame"
variant = "choc_choc"
font = "FiraCode Nerd Font:style=Medium"
color = "$cap"
primary.size = 4
primary.color = "$prim"
secondary.size = 3
secondary.color = "$aux"
tertiary.size = 3
tertiary.color = "$sys"

[rows.r0]
kind = "nt"
primaries.legend = ["[{", "!1", "@2", "#3", "$4", "%5", "^6", "&7", "*8", "(9", ")0", "]}"]

